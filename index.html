  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STACKED">
  <meta name="theme-color" content="#0D1B2E">
<style>
  :root{
    --bg:#0D1B2E; --bg2:#0A1628; --card:#1C2A3D; --card-done:#14202F; --line:#263A52;
    --white:#F4F7FB; --muted:#8FA3B8; --dim:#5E7288; --gold:#D4AF37; --gold-soft:#E5C158;
    --gold-dim:rgba(212,175,55,.12); --green:#4CAF7D; --info:#7FA8C9; --info-bg:rgba(127,168,201,.10); --info-br:rgba(127,168,201,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
  html,body{height:100%;}
  body{background:#060D18;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    color:var(--white);display:flex;justify-content:center;align-items:center;overflow:hidden;}
  #app{width:100%;max-width:440px;height:100vh;max-height:920px;background:var(--bg);position:relative;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);}
  @media(min-width:460px){#app{border-radius:28px;height:900px;border:1px solid #1A2332;}}

  .view{flex:1;overflow-y:auto;padding:0 0 96px;scrollbar-width:none;display:none;}
  .view.active{display:block;animation:fade .3s ease;}
  .view::-webkit-scrollbar{display:none;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}

  .head{padding:20px 20px 8px;display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;
    background:linear-gradient(180deg,var(--bg) 70%,transparent);z-index:20;}
  .head h1{font-size:27px;font-weight:800;letter-spacing:-.02em;}
  .head .sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .hr{display:flex;align-items:center;gap:10px;}
  .streak-pill{background:var(--gold-dim);border:1px solid rgba(212,175,55,.35);color:var(--gold-soft);
    font-size:13px;font-weight:800;padding:6px 12px;border-radius:999px;white-space:nowrap;transition:transform .25s;}
  .streak-pill.bump{transform:scale(1.18);}
  .gear{color:var(--muted);font-size:20px;background:none;border:none;cursor:pointer;padding:4px;}

  .wrap{padding:6px 18px 0;}

  /* AI banner */
  .ai-banner{background:linear-gradient(135deg,rgba(212,175,55,.11),rgba(212,175,55,.03));
    border:1px solid rgba(212,175,55,.3);border-left:3px solid var(--gold);border-radius:14px;
    padding:13px 15px;margin:8px 0 6px;display:flex;align-items:center;gap:11px;cursor:pointer;}
  .ai-banner .sp{font-size:17px;}
  .ai-banner .t{flex:1;font-size:13px;line-height:1.4;}
  .ai-banner .t b{color:var(--gold-soft);}
  .ai-banner .c{color:var(--gold);font-size:18px;}

  .sec{font-size:11.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);
    margin:20px 4px 10px;display:flex;align-items:baseline;gap:8px;}
  .sec .an{font-weight:500;letter-spacing:0;text-transform:none;font-size:12px;color:var(--dim);}

  .dose{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;margin-bottom:10px;
    display:flex;align-items:center;gap:14px;transition:all .35s;}
  .dose .info{flex:1;min-width:0;}
  .dose .nm{font-size:15.5px;font-weight:600;}
  .dose .mt{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .dose .mt .tag{color:var(--gold-soft);}
  .check{width:44px;height:44px;border-radius:50%;flex-shrink:0;border:2px solid #3D5470;background:transparent;
    display:flex;align-items:center;justify-content:center;font-size:19px;color:transparent;cursor:pointer;transition:all .25s;}
  .check:active{transform:scale(.86);}
  .dose.done{background:var(--card-done);border-color:#1E2C3E;opacity:.6;}
  .dose.done .check{background:var(--gold);border-color:var(--gold);color:#0D1B2E;}
  .dose.done .nm{text-decoration:line-through;text-decoration-color:rgba(244,247,251,.35);}
  .dose.skipped{opacity:.5;}
  .dose.skipped .check{border-color:var(--dim);color:var(--dim);font-size:13px;}

  .hint{text-align:center;font-size:11.5px;color:var(--dim);margin:2px 0 6px;}
  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty .big{font-size:40px;margin-bottom:12px;}
  .empty .t{font-size:16px;font-weight:600;color:var(--white);margin-bottom:6px;}
  .empty .d{font-size:13px;line-height:1.5;}

  /* buttons */
  .btn{padding:15px;border-radius:14px;font-size:16px;font-weight:700;border:none;width:100%;cursor:pointer;transition:transform .15s;}
  .btn:active{transform:scale(.97);}
  .btn-gold{background:var(--gold);color:#0D1B2E;}
  .btn-slate{background:var(--card);color:var(--white);border:1px solid var(--line);}
  .btn-ghost{background:none;color:var(--muted);font-weight:600;font-size:14px;padding:12px;}

  /* tab bar */
  .tabs{position:absolute;bottom:0;left:0;right:0;background:rgba(10,20,36,.94);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:11px 8px 24px;z-index:30;}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);
    background:none;border:none;cursor:pointer;flex:1;transition:color .2s;}
  .tab .i{font-size:21px;}
  .tab.active{color:var(--gold-soft);}
  .fab{position:absolute;bottom:92px;right:20px;width:58px;height:58px;border-radius:50%;background:var(--gold);
    color:#0D1B2E;font-size:30px;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(212,175,55,.4);z-index:30;
    display:flex;align-items:center;justify-content:center;transition:transform .15s;}
  .fab:active{transform:scale(.9);}

  /* stack cards */
  .scard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;margin-bottom:10px;cursor:pointer;
    display:flex;align-items:center;gap:12px;}
  .scard .pic{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#22344a,#1a2a3d);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .scard .body{flex:1;min-width:0;}
  .scard .nm{font-size:15.5px;font-weight:600;}
  .scard .mt{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .scard .chev{color:var(--dim);font-size:20px;}
  .scard.paused{opacity:.55;}

  /* modal */
  .modal{position:absolute;inset:0;background:rgba(4,8,14,.72);backdrop-filter:blur(3px);z-index:100;
    display:none;align-items:flex-end;}
  .modal.open{display:flex;animation:fade .2s;}
  .sheet{width:100%;background:var(--bg);border-radius:24px 24px 0 0;border-top:1px solid var(--line);
    padding:10px 20px 30px;max-height:92%;overflow-y:auto;scrollbar-width:none;animation:slideup .3s ease;}
  .sheet::-webkit-scrollbar{display:none;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
  .grip{width:40px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 16px;}
  .sheet h2{font-size:22px;font-weight:700;margin-bottom:4px;}
  .sheet .sd{font-size:13.5px;color:var(--muted);margin-bottom:18px;line-height:1.45;}

  .field{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:10px;}
  .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px;}
  .field input,.field select{width:100%;background:none;border:none;color:var(--white);font-size:15px;font-weight:600;outline:none;font-family:inherit;}
  .field input::placeholder{color:var(--dim);}
  .field.flag{border-color:rgba(212,175,55,.45);}
  .field.flag label{color:var(--gold-soft);}

  /* viewfinder */
  .vf{border-radius:18px;height:230px;margin:6px 0 14px;position:relative;overflow:hidden;
    background:repeating-linear-gradient(135deg,#10203a 0 14px,#0e1c33 14px 28px);
    border:2px dashed rgba(212,175,55,.5);display:flex;align-items:center;justify-content:center;}
  .vf .lbl{width:130px;height:172px;border-radius:9px;background:linear-gradient(160deg,#f4f1e8,#e6e0d0);color:#2a2a2a;
    padding:12px 10px;font-size:8px;line-height:1.3;transform:rotate(-3deg);box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .vf .lbl .lt{font-size:11px;font-weight:800;color:#1a3a5c;}
  .vf .lbl .lf{border-top:1.5px solid #1a3a5c;margin-top:4px;padding-top:3px;display:flex;justify-content:space-between;}
  .vf .sl{position:absolute;left:8%;right:8%;height:2px;background:var(--gold);box-shadow:0 0 12px 2px var(--gold);animation:scan 2.2s ease-in-out infinite;}
  @keyframes scan{0%,100%{top:16%;}50%{top:82%;}}
  .vf .pr{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:12px;color:rgba(244,247,251,.85);}
  .cap{width:62px;height:62px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.3);margin:0 auto 8px;cursor:pointer;transition:transform .15s;}
  .cap:active{transform:scale(.9);}

  .read-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(76,175,125,.14);border:1px solid rgba(76,175,125,.4);
    color:var(--green);font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;margin-bottom:12px;}

  .insight{background:linear-gradient(135deg,rgba(212,175,55,.12),rgba(212,175,55,.03));border:1px solid rgba(212,175,55,.35);
    border-left:3px solid var(--gold);border-radius:15px;padding:16px;margin:6px 0 14px;}
  .insight .sp{font-size:20px;color:var(--gold-soft);}
  .insight .it{font-size:16px;font-weight:700;margin:8px 0 6px;}
  .insight .ib{font-size:13.5px;color:var(--muted);line-height:1.5;}
  .insight .ib b{color:var(--gold-soft);}

  .advisory{background:var(--info-bg);border:1px solid var(--info-br);border-radius:13px;padding:13px 14px;margin:6px 0 12px;
    display:flex;gap:10px;align-items:flex-start;}
  .advisory .g{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--info);color:var(--info);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
  .advisory .b{flex:1;font-size:12.5px;line-height:1.5;}
  .advisory .b .h{font-size:11px;font-weight:700;color:var(--info);letter-spacing:.03em;margin-bottom:3px;}

  /* progress */
  .hero{background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,.16),transparent 70%),var(--card);
    border:1px solid rgba(212,175,55,.3);border-radius:22px;padding:24px 20px;text-align:center;margin:8px 0;position:relative;overflow:hidden;}
  .hero .fl{font-size:28px;}
  .hero .num{font-size:60px;font-weight:800;line-height:1;color:var(--gold-soft);letter-spacing:-.03em;margin:2px 0;text-shadow:0 4px 24px rgba(212,175,55,.35);}
  .hero .un{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);}
  .hero .id{font-size:13.5px;margin-top:11px;font-weight:600;}
  .hero .bt{font-size:12px;color:var(--muted);margin-top:4px;}

  .heat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;}
  .hgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .hd{font-size:9px;color:var(--dim);text-align:center;font-weight:700;text-transform:uppercase;margin-bottom:3px;}
  .cell{aspect-ratio:1;border-radius:5px;background:#182636;}
  .cell.a1{background:rgba(212,175,55,.22);}.cell.a2{background:rgba(212,175,55,.42);}
  .cell.a3{background:rgba(212,175,55,.66);}.cell.a4{background:var(--gold);}
  .cell.fut{background:#101c2c;opacity:.5;}

  .bar{margin-bottom:12px;}
  .bar .bt{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px;}
  .bar .bt .p{font-weight:700;color:var(--gold-soft);}
  .track{height:8px;border-radius:5px;background:#182636;overflow:hidden;}
  .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:width .5s;}

  .badges{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
  .badge{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 6px;text-align:center;}
  .badge.on{border-color:rgba(212,175,55,.4);background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,.12),transparent 75%),var(--card);}
  .badge .bi{font-size:24px;filter:grayscale(1) opacity(.4);}
  .badge.on .bi{filter:none;}
  .badge .bn{font-size:10.5px;font-weight:700;margin-top:4px;}
  .badge.on .bn{color:var(--gold-soft);}
  .badge .bp{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.25;}

  .anchor-row{margin-bottom:15px;}
  .anchor-top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:7px;}
  .anchor-top .l{font-weight:600;}.anchor-top .v{color:var(--gold-soft);font-weight:700;}
  input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:var(--line);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4);}

  .toast{position:absolute;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);
    border:1px solid rgba(212,175,55,.4);color:var(--white);font-size:13px;font-weight:600;padding:11px 18px;border-radius:999px;
    z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast .g{color:var(--gold-soft);}

  .list-pick{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;
    display:flex;align-items:center;gap:12px;}
  .list-pick:active{background:#22344a;}
  .list-pick .e{font-size:20px;}
  .list-pick .n{font-size:14.5px;font-weight:600;}
  .list-pick .s{font-size:12px;color:var(--muted);}

  /* ---- in-app tutorial (coach marks) ---- */
  .tut{position:absolute;inset:0;z-index:400;display:none;}
  .tut.on{display:block;}
  .tut-ring{position:absolute;border-radius:16px;box-shadow:0 0 0 9999px rgba(4,9,16,.80);
    border:2px solid var(--gold);transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;}
  .tut-ring.pulse{animation:tutpulse 1.6s ease-in-out infinite;}
  @keyframes tutpulse{0%,100%{box-shadow:0 0 0 9999px rgba(4,9,16,.80),0 0 0 0 rgba(212,175,55,.5);}
    50%{box-shadow:0 0 0 9999px rgba(4,9,16,.80),0 0 0 10px rgba(212,175,55,0);}}
  .tut-card{position:absolute;left:20px;right:20px;background:var(--card);border:1px solid rgba(212,175,55,.4);
    border-radius:18px;padding:18px 18px 16px;box-shadow:0 16px 44px rgba(0,0,0,.55);}
  .tut-card .step{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-soft);}
  .tut-card .th{font-size:18px;font-weight:700;margin:7px 0 5px;letter-spacing:-.01em;}
  .tut-card .tb{font-size:13.5px;line-height:1.5;color:var(--muted);}
  .tut-card .tb b{color:var(--white);}
  .tut-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
  .tut-dots{display:flex;gap:6px;}
  .tut-dots i{width:7px;height:7px;border-radius:50%;background:var(--line);display:block;transition:all .3s;}
  .tut-dots i.on{background:var(--gold);width:18px;border-radius:4px;}
  .tut-btns{display:flex;gap:8px;}
  .tut-btns button{border:none;cursor:pointer;font-weight:700;font-size:13.5px;border-radius:10px;padding:9px 16px;}
  .tut-next{background:var(--gold);color:#0D1B2E;}
  .tut-back{background:var(--card);color:var(--muted);border:1px solid var(--line)!important;}
  .tut-skip{position:absolute;top:16px;right:18px;background:rgba(28,42,61,.8);border:1px solid var(--line);
    color:var(--muted);font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;z-index:401;}
</style>

<body>
<div id="app">
  <!-- TODAY -->
  <div class="view active" id="v-today"></div>
  <!-- STACK -->
  <div class="view" id="v-stack"></div>
  <!-- PROGRESS -->
  <div class="view" id="v-progress"></div>

  <button class="fab" id="fab" onclick="openAdd()">+</button>

  <div class="tabs">
    <button class="tab active" data-tab="today" onclick="showTab('today')"><span class="i">☉</span>Today</button>
    <button class="tab" data-tab="stack" onclick="showTab('stack')"><span class="i">💊</span>My Stack</button>
    <button class="tab" data-tab="progress" onclick="showTab('progress')"><span class="i">📈</span>Progress</button>
  </div>

  <div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>
</div>

<script>
/* ============================================================
   STACKED — working prototype
   Real (simplified) timing engine seeded with actual interaction rules.
   ============================================================ */

// ---------- persistence (graceful: localStorage if available, else memory) ----------
const store = (()=>{ let mem={}; let ok=false;
  try{ const k='__stacked_test__'; localStorage.setItem(k,'1'); localStorage.removeItem(k); ok=true; }catch(e){ ok=false; }
  return {
    get(k){ try{ return ok?JSON.parse(localStorage.getItem(k)):mem[k]; }catch(e){ return mem[k]; } },
    set(k,v){ try{ ok?localStorage.setItem(k,JSON.stringify(v)):(mem[k]=v); }catch(e){ mem[k]=v; } }
  };
})();

// ---------- anchors ----------
const ANCHORS=[
  {key:'wake',label:'Wake',icon:'🌅',def:6.5},
  {key:'breakfast',label:'Breakfast',icon:'🍳',def:8},
  {key:'lunch',label:'Lunch',icon:'☀️',def:12.5},
  {key:'dinner',label:'Dinner',icon:'🌙',def:18.5},
  {key:'bedtime',label:'Bedtime',icon:'🛏️',def:22},
];
const MEAL_ANCHORS=['breakfast','lunch','dinner'];

// ---------- demo supplement catalog (mimics OCR output) ----------
const CATALOG=[
  {name:'Vitamin D3',brand:'Nature Made',emoji:'☀️',serving:'1 softgel',dose:'5000 IU',tags:['fat_soluble']},
  {name:'Omega-3 Fish Oil',brand:'Nordic Naturals',emoji:'🐟',serving:'2 softgels',dose:'1200 mg',tags:['fat_soluble']},
  {name:'Iron',brand:'Thorne',emoji:'🩸',serving:'1 capsule',dose:'25 mg',tags:['iron']},
  {name:'Calcium + K2',brand:'NOW',emoji:'🦴',serving:'1 tablet',dose:'600 mg',tags:['calcium','fat_soluble']},
  {name:'Zinc',brand:'Life Extension',emoji:'🛡️',serving:'1 capsule',dose:'30 mg',tags:['zinc','with_food']},
  {name:'Magnesium Glycinate',brand:'Doctor’s Best',emoji:'🌊',serving:'2 capsules',dose:'400 mg',tags:['magnesium','sleep']},
  {name:'Vitamin C',brand:'Nature’s Bounty',emoji:'🍊',serving:'1 tablet',dose:'1000 mg',tags:['vitamin_c']},
  {name:'B-Complex',brand:'Garden of Life',emoji:'⚡',serving:'1 capsule',dose:'1 serving',tags:['bvitamin']},
  {name:'Melatonin',brand:'Natrol',emoji:'😴',serving:'1 tablet',dose:'3 mg',tags:['sleep_strict']},
  {name:'CoQ10',brand:'Qunol',emoji:'❤️',serving:'1 softgel',dose:'100 mg',tags:['fat_soluble']},
  {name:'Probiotic',brand:'Seed',emoji:'🦠',serving:'2 capsules',dose:'1 serving',tags:['with_food']},
  {name:'Ashwagandha',brand:'KSM-66',emoji:'🌿',serving:'1 capsule',dose:'600 mg',tags:['flexible']},
  {name:'Ginkgo Biloba',brand:'Nature’s Way',emoji:'🍃',serving:'1 capsule',dose:'120 mg',tags:['flexible','med_bloodthinner']},
  {name:'Creatine',brand:'Optimum',emoji:'💪',serving:'1 scoop',dose:'5 g',tags:['flexible']},
];

// ---------- THE TIMING ENGINE (deterministic, rule-based) ----------
// Returns {anchor, rationale} for a supplement given the current stack.
function scheduleSupplement(sup, stack){
  const t=sup.tags;
  const has=x=>t.includes(x);
  // find where iron and calcium currently live so we can separate
  const anchorOf=name=>{ const s=stack.find(x=>x.tags.includes(name)&&x.active); return s?s.anchor:null; };
  const ironAt=anchorOf('iron'), calAt=anchorOf('calcium'), zincAt=anchorOf('zinc');

  // Strict sleep items
  if(has('sleep_strict')) return {anchor:'bedtime',rationale:'Melatonin signals sleep onset — best taken about 30–60 minutes before bed. ✦'};
  if(has('sleep')||has('magnesium')) return {anchor:'bedtime',rationale:'Magnesium glycinate is calming and often used to support sleep — scheduled for bedtime. ✦'};
  if(has('bvitamin')) return {anchor:'breakfast',rationale:'B-vitamins are energizing, so mornings avoid any chance of disrupting sleep. ✦'};

  // Iron: needs a meal slot 2h+ from calcium & zinc; also away from coffee (morning)
  if(has('iron')){
    // prefer lunch (usually far from breakfast calcium/coffee and dinner calcium)
    let choice='lunch';
    const taken=[calAt,zincAt].filter(Boolean);
    if(!taken.includes('lunch')) choice='lunch';
    else if(!taken.includes('dinner')) choice='dinner';
    else choice='lunch';
    return {anchor:choice,rationale:'Iron gets its own meal slot, kept 2+ hours from calcium and zinc — they compete for absorption. Also away from morning coffee. ✦'};
  }
  // Calcium: meal slot, away from iron
  if(has('calcium')){
    let choice = (ironAt==='dinner') ? 'breakfast' : 'dinner';
    return {anchor:choice, rationale:`Calcium takes the ${choice} slot, kept well away from your iron so neither blocks the other. ✦`};
  }
  // Zinc: with food, away from iron
  if(has('zinc')){
    let choice = (ironAt==='breakfast')?'dinner':'breakfast';
    return {anchor:choice, rationale:`Zinc is easier on the stomach with food and kept clear of your iron — placed at ${choice}. ✦`};
  }
  // Fat-soluble (D3, omega-3, CoQ10, K2): need a meal with fat → breakfast or dinner
  if(has('fat_soluble')){
    return {anchor:'breakfast', rationale:'Fat-soluble — pairing it with breakfast (a meal with some fat) helps your body actually absorb it. ✦'};
  }
  if(has('vitamin_c')){
    // pair with iron if present (synergy), else breakfast
    if(ironAt) return {anchor:ironAt, rationale:'Vitamin C boosts iron absorption — paired with your iron dose for synergy. ✦'};
    return {anchor:'breakfast', rationale:'Vitamin C is water-soluble and flexible — placed at breakfast to build a simple routine. ✦'};
  }
  if(has('with_food')) return {anchor:'dinner', rationale:'Best taken with food to minimize stomach upset — placed at dinner. ✦'};
  // flexible
  return {anchor:'breakfast', rationale:'Timing is flexible for this one — anchored to breakfast so it becomes an easy daily habit. ✦'};
}

function medAdvisory(sup){
  if(sup.tags.includes('med_bloodthinner')){
    return 'Ginkgo can interact with blood thinners and may increase bleeding risk. This isn’t a complete medication check — worth a quick word with your pharmacist.';
  }
  return null;
}

// ---------- state ----------
let S = store.get('stacked_state');
function seed(){
  const anchors={}; ANCHORS.forEach(a=>anchors[a.key]=a.def);
  const mk=(cat,anchor)=>({id:uid(),name:cat.name,brand:cat.brand,emoji:cat.emoji,serving:cat.serving,dose:cat.dose,tags:cat.tags.slice(),anchor,active:true});
  const stack=[
    mk(CATALOG[0],'breakfast'), // D3
    mk(CATALOG[1],'breakfast'), // omega
    mk(CATALOG[2],'lunch'),     // iron
    mk(CATALOG[3],'dinner'),    // calcium
    mk(CATALOG[5],'bedtime'),   // magnesium
  ];
  S={
    anchors,
    stack,
    logs:{},              // {dateStr: {supId: 'taken'|'skipped'}}
    streak:14, best:21,
    createdDays:34,       // for heat-map history
    seededHeat:genHeat(),
    firstOpen:true,
    badges:{first:true,scanner:false,week:true,honest:false,century:false,optimizer:false,monthly:false,consistent:false,comeback:false},
    doseCount:64,
    dismissedBanner:false,
  };
  save();
}
function genHeat(){ // 35 days of adherence levels 0-4 (last cell(s) = future)
  const base=[3,4,4,2,3,0,1, 4,4,3,4,4,1,2, 4,3,4,4,3,2,0, 4,4,4,3,4,2,3, 4,4,4,3];
  return base;
}
if(!S) seed();

function save(){ store.set('stacked_state', S); }
function uid(){ return 'x'+Math.random().toString(36).slice(2,9); }
function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function fmtTime(h){ let hr=Math.floor(h), m=(h%1)?'30':'00', ap=hr>=12?'PM':'AM', hh=hr%12||12; return hh+':'+m+' '+ap; }
function todayDateLabel(){ return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }

// ---------- dose logic ----------
function todaysDoses(){
  const log=S.logs[todayKey()]||{};
  const groups={};
  MEAL_ANCHORS.concat(['wake','bedtime']).forEach(k=>groups[k]=[]);
  S.stack.filter(s=>s.active).forEach(s=>{
    if(!groups[s.anchor]) groups[s.anchor]=[];
    groups[s.anchor].push({sup:s, status: log[s.id]||'pending'});
  });
  return groups;
}
function anchorMeta(key){ return ANCHORS.find(a=>a.key===key)||{label:key,icon:'•',def:12}; }

function logDose(supId,status){
  const k=todayKey(); if(!S.logs[k]) S.logs[k]={};
  const prev=S.logs[k][supId];
  S.logs[k][supId]=status;
  if(status==='taken' && prev!=='taken'){ S.doseCount++; bumpStreakVisual(); }
  if(status==='skipped'){ S.badges.honest=true; }
  // recompute simple streak: if all today's active doses resolved & at least one taken, keep streak
  save(); renderToday(); renderProgress();
  if(status==='taken') toast('<span class="g">✓ Logged</span> · streak '+S.streak+' 🔥');
  else toast('Skipped — honestly. Streak’s safe.');
}
function bumpStreakVisual(){ const p=document.querySelector('#streakPill'); if(p){p.classList.add('bump'); setTimeout(()=>p.classList.remove('bump'),260);} }

// ---------- RENDER: TODAY ----------
function renderToday(){
  const el=document.getElementById('v-today');
  const groups=todaysDoses();
  const anyPending = Object.values(groups).some(g=>g.some(d=>d.status==='pending'));
  const activeCount=S.stack.filter(s=>s.active).length;
  let banner='';
  const ironS=S.stack.find(s=>s.tags.includes('iron')&&s.active);
  if(!S.dismissedBanner && ironS){
    banner=`<div class="ai-banner" onclick="dismissBanner()">
      <span class="sp">✦</span>
      <span class="t"><b>Your stack is optimized.</b> I've timed Iron away from Calcium, and your fat-soluble vitamins with meals.</span>
      <span class="c">›</span></div>`;
  }
  let body='';
  const order=['wake','breakfast','lunch','dinner','bedtime'];
  let shownHint=false;
  order.forEach(k=>{
    const g=groups[k]; if(!g||!g.length) return;
    const m=anchorMeta(k);
    body+=`<div class="sec">${m.label} <span class="an">· ~${fmtTime(S.anchors[k])}</span></div>`;
    g.forEach(d=>{
      const done=d.status==='taken', skip=d.status==='skipped';
      const cls=done?'dose done':(skip?'dose skipped':'dose');
      const tag = d.sup.tags.includes('iron')||d.sup.tags.includes('calcium')||d.sup.tags.includes('fat_soluble')||d.sup.tags.includes('sleep')||d.sup.tags.includes('magnesium')
        ? '<span class="tag">✦ AI-timed</span>' : '';
      const mark = done?'✓':(skip?'—':'✓');
      body+=`<div class="${cls}">
        <div class="info"><div class="nm">${d.sup.name}</div>
          <div class="mt">${d.sup.dose} · ${d.sup.serving} ${tag?'· '+tag:''}</div></div>
        <button class="check" onclick="onCheck('${d.sup.id}','${d.status}')" oncontextmenu="return skipMenu(event,'${d.sup.id}')">${mark}</button>
      </div>`;
    });
    if(!shownHint && g.some(d=>d.status==='pending')){ body+=`<div class="hint">tap the circle to log · long-press to skip</div>`; shownHint=true; }
  });
  if(activeCount===0){
    body=`<div class="empty"><div class="big">💊</div><div class="t">Your timeline’s ready</div>
      <div class="d">Add your first supplement and I’ll schedule it for you.</div>
      <div style="margin-top:18px"><button class="btn btn-gold" onclick="openAdd()">Add a supplement</button></div></div>`;
  }
  el.innerHTML=`
    <div class="head">
      <div><h1>Today</h1><div class="sub">${todayDateLabel()}</div></div>
      <div class="hr"><div class="streak-pill" id="streakPill">🔥 ${S.streak} days</div>
        <button class="gear" onclick="openSettings()">⚙︎</button></div>
    </div>
    <div class="wrap">${banner}${body}
      ${activeCount>0&&!anyPending?'<div class="hint" style="margin-top:16px">✓ All done for today — nice work.</div>':''}
    </div>`;
}
function onCheck(id,status){ if(status==='taken'){ logDose(id,'pending'); } else { logDose(id,'taken'); } }
function skipMenu(e,id){ e.preventDefault(); logDose(id,'skipped'); return false; }
function dismissBanner(){ S.dismissedBanner=true; save(); renderToday(); }

// long-press for skip (touch)
let pressTimer=null;
document.addEventListener('touchstart',e=>{
  const b=e.target.closest('.check'); if(!b) return;
  pressTimer=setTimeout(()=>{ const m=b.getAttribute('onclick').match(/'([^']+)'/); if(m){ logDose(m[1],'skipped'); } },550);
},{passive:true});
document.addEventListener('touchend',()=>{ if(pressTimer)clearTimeout(pressTimer); });

// ---------- RENDER: STACK ----------
function renderStack(){
  const el=document.getElementById('v-stack');
  const active=S.stack.filter(s=>s.active), paused=S.stack.filter(s=>!s.active);
  let body='';
  if(!S.stack.length){
    body=`<div class="empty"><div class="big">💊</div><div class="t">No supplements yet</div><div class="d">Tap + to add your first.</div></div>`;
  } else {
    active.forEach(s=>{ body+=stackCard(s); });
    if(paused.length){ body+=`<div class="sec">Paused</div>`; paused.forEach(s=>{ body+=stackCard(s); }); }
  }
  el.innerHTML=`<div class="head"><div><h1>My Stack</h1><div class="sub">${active.length} active · perfectly timed</div></div></div>
    <div class="wrap">${body}</div>`;
}
function stackCard(s){
  const m=anchorMeta(s.anchor);
  return `<div class="scard ${s.active?'':'paused'}" onclick="openDetail('${s.id}')">
    <div class="pic">${s.emoji}</div>
    <div class="body"><div class="nm">${s.name}</div>
      <div class="mt">${s.dose} · ${m.icon} ${m.label}</div></div>
    <div class="chev">›</div></div>`;
}

// ---------- RENDER: PROGRESS ----------
function renderProgress(){
  const el=document.getElementById('v-progress');
  const heat=S.seededHeat;
  let cells='';
  for(let i=0;i<35;i++){
    if(i<heat.length){ const lv=heat[i]; cells+=`<div class="cell ${lv?'a'+lv:''}"></div>`; }
    else cells+=`<div class="cell fut"></div>`;
  }
  // per-supplement adherence (demo-ish from tags + a little variance)
  const adh=S.stack.filter(s=>s.active).map((s,i)=>({name:s.name,pct:[68,82,94,97,88,75][i%6]})).sort((a,b)=>a.pct-b.pct);
  let bars=adh.map(a=>`<div class="bar"><div class="bt"><span>${a.name}</span><span class="p">${a.pct}%</span></div>
    <div class="track"><div class="fill" style="width:${a.pct}%"></div></div></div>`).join('');
  const B=S.badges;
  const badge=(on,ic,nm,sub)=>`<div class="badge ${on?'on':''}"><div class="bi">${ic}</div><div class="bn">${nm}</div><div class="bp">${on?'Earned':sub}</div></div>`;
  const badges=[
    badge(B.first,'👟','First Steps','Log a dose'),
    badge(B.scanner,'📷','Scanner','Scan a label'),
    badge(B.week,'🗓️','Week One','7-day streak'),
    badge(B.honest,'🤝','Honest','Skip truthfully'),
    badge(S.doseCount>=100,'💯','Century',S.doseCount+' / 100'),
    badge(B.optimizer,'✦','Optimizer','Accept an AI tip'),
    badge(S.streak>=30,'🌙','Monthly',S.streak+' / 30 days'),
    badge(B.consistent,'🎯','Consistent','90% in a month'),
    badge(B.comeback,'💪','Comeback','Rebuild a streak'),
  ].join('');
  el.innerHTML=`<div class="head"><div><h1>Progress</h1></div></div>
    <div class="wrap">
      <div class="hero"><div class="fl">🔥</div><div class="num">${S.streak}</div><div class="un">day streak</div>
        <div class="id">You’re building a real habit.</div><div class="bt">Personal best: ${S.best} days</div></div>
      <div class="sec">Last 5 weeks</div>
      <div class="heat"><div class="hgrid"><div class="hd">M</div><div class="hd">T</div><div class="hd">W</div><div class="hd">T</div><div class="hd">F</div><div class="hd">S</div><div class="hd">S</div></div>
        <div class="hgrid" style="margin-top:5px">${cells}</div></div>
      <div class="sec">By supplement · last 30 days</div>${bars||'<div class="hint">Add supplements to see adherence.</div>'}
      <div class="sec">Achievements</div><div class="badges">${badges}</div>
    </div>`;
}

function manualAdd(){

    <div class="sd">Fill in what you’ve got — the essentials are enough.</div>

function commitManual(){

function reviewSupplement(cat,scanned){
  const sheet=document.getElementById('sheet');
  const draft={id:uid(),name:cat.name,brand:cat.brand||'',emoji:cat.emoji||'💊',serving:cat.serving,dose:cat.dose,tags:cat.tags.slice(),active:true};
  window.__draft=draft;
  const badge = scanned? `<div class="read-badge">✓ Read from your label in 1.1s</div>`:'';
  sheet.innerHTML=`<div class="grip"></div>${badge}
    <h2>Look right?</h2>

    ${draft.brand?`<div class="field"><label>Brand</label><input id="r-brand" value="${draft.brand}"></div>`:''}
    <div class="field"><label>Serving</label><input id="r-serving" value="${draft.serving}"></div>

    <button class="btn btn-gold" onclick="confirmAdd()">Add to my stack</button>`;
}
function confirmAdd(){
  const d=window.__draft;
  d.name=document.getElementById('r-name').value||d.name;
  d.serving=document.getElementById('r-serving').value||d.serving;
  d.dose=document.getElementById('r-dose').value||d.dose;
  const plan=scheduleSupplement(d,S.stack);
  d.anchor=plan.anchor;
  const adv=medAdvisory(d);
  // show the schedule reveal
  const sheet=document.getElementById('sheet');
  const m=anchorMeta(plan.anchor);
  sheet.innerHTML=`<div class="grip"></div>
    <div class="insight"><div class="sp">✦</div>
      <div class="it">Best time: with ${m.label.toLowerCase()}</div>

    ${adv?`<div class="advisory"><div class="g">i</div><div class="b"><div class="h">GOOD TO KNOW</div>${adv}</div></div>`:''}
    <button class="btn btn-gold" onclick="finalizeAdd()">Sounds good</button>
    <button class="btn btn-ghost" onclick="pickAnchor()">Choose a different time</button>`;
}
function pickAnchor(){
  const sheet=document.getElementById('sheet');
  const opts=['breakfast','lunch','dinner','bedtime','wake'].map(k=>{const m=anchorMeta(k);
    return `<div class="list-pick" onclick="setAnchor('${k}')"><span class="e">${m.icon}</span><div><div class="n">${m.label}</div><div class="s">~${fmtTime(S.anchors[k])}</div></div></div>`;}).join('');
  sheet.innerHTML=`<div class="grip"></div><h2>When do you want it?</h2><div class="sd">You can always let the AI re-optimize later.</div>${opts}`;
}
function setAnchor(k){ window.__draft.anchor=k; finalizeAdd(); }
function finalizeAdd(){
  const d=window.__draft;
  if(!d.anchor) d.anchor='breakfast';
  S.stack.push(d); S.badges.optimizer=true; save();
  closeModal(); renderToday(); renderStack(); renderProgress();
  const m=anchorMeta(d.anchor);
  toast('<span class="g">✦ '+d.name+'</span> added · '+m.label);
}

// ---------- DETAIL ----------

  const m=anchorMeta(s.anchor);
  const plan=scheduleSupplement(s,S.stack.filter(x=>x.id!==id));
  const adv=medAdvisory(s);
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="grip"></div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
      <div class="pic" style="width:52px;height:52px;font-size:26px;border-radius:14px;background:linear-gradient(135deg,#22344a,#1a2a3d);display:flex;align-items:center;justify-content:center">${s.emoji}</div>
      <div><h2 style="margin:0">${s.name}</h2><div class="sd" style="margin:2px 0 0">${s.brand?s.brand+' · ':''}${s.dose} · ${s.serving}</div></div></div>
    <div class="sec" style="margin-left:0">Current schedule</div>
    <div class="scard" style="cursor:default"><div class="pic">${m.icon}</div>
      <div class="body"><div class="nm">${m.label} · ~${fmtTime(S.anchors[s.anchor])}</div>
      <div class="mt" style="color:var(--gold-soft)">✦ AI-timed</div></div></div>

function togglePause(id){ const s=S.stack.find(x=>x.id===id); s.active=!s.active; save(); closeModal(); renderToday();renderStack();renderProgress(); toast(s.active?'Resumed':'Paused'); }
function removeSup(id){ S.stack=S.stack.filter(x=>x.id!==id); save(); closeModal(); renderToday();renderStack();renderProgress(); toast('Removed from stack'); }

// ---------- SETTINGS ----------
function openSettings(){
  const sheet=document.getElementById('sheet');
  const sliders=['wake','breakfast','lunch','dinner','bedtime'].map(k=>{const m=anchorMeta(k);
    return `<div class="anchor-row"><div class="anchor-top"><span class="l">${m.icon} ${m.label}</span><span class="v" id="av-${k}">${fmtTime(S.anchors[k])}</span></div>
    <input type="range" min="${k==='wake'?5:k==='bedtime'?20:k==='breakfast'?5:k==='lunch'?11:16}" max="${k==='wake'?10:k==='bedtime'?24:k==='breakfast'?11:k==='lunch'?15:21}" step="0.5" value="${S.anchors[k]}" oninput="setSlider('${k}',this.value)"></div>`;}).join('');
  sheet.innerHTML=`<div class="grip"></div><h2>Your anchors</h2>
    <div class="sd">STACKED times everything around your real day. Change these and the engine re-optimizes.</div>
    ${sliders}
    <button class="btn btn-gold" onclick="saveAnchors()">Save & re-optimize</button>
    <button class="btn btn-slate" onclick="closeModal();setTimeout(()=>startTutorial(),250)">▶ Replay the tour</button>
    <button class="btn btn-ghost" onclick="resetDemo()">Reset demo data</button>
    <div style="text-align:center;font-size:11px;color:var(--dim);margin-top:14px;line-height:1.5">STACKED prototype · general guidance, not medical advice.<br>Doesn’t check prescription meds — ask your pharmacist.</div>`;
  openModal();
}
let tmpAnchors=null;
function setSlider(k,v){ tmpAnchors=tmpAnchors||Object.assign({},S.anchors); tmpAnchors[k]=parseFloat(v); document.getElementById('av-'+k).textContent=fmtTime(parseFloat(v)); }
function saveAnchors(){
  if(tmpAnchors) S.anchors=tmpAnchors; tmpAnchors=null;
  // re-optimize meal-based items lightly (keep it simple: reschedule all)
  S.stack.forEach(s=>{ const plan=scheduleSupplement(s,S.stack.filter(x=>x.id!==s.id)); /* keep user anchors, just refresh */ });
  save(); closeModal(); renderToday(); toast('<span class="g">✦ Re-optimized</span> around your day');
}
function resetDemo(){ seed(); closeModal(); renderToday();renderStack();renderProgress(); toast('Demo reset'); }

// ---------- modal / tabs / toast ----------
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });
function showTab(t){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+t).classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.getElementById('fab').style.display = (t==='progress')?'none':'flex';
  if(t==='today')renderToday(); if(t==='stack')renderStack(); if(t==='progress')renderProgress();
}
let toastTimer=null;
function toast(html){ const t=document.getElementById('toast'); t.innerHTML=html; t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1900); }

// ---------- IN-APP TUTORIAL (coach marks) ----------
const TUT=[
  {sel:null, title:"Welcome to STACKED", body:"Your supplements, perfectly timed — automatically. Here’s a 30-second tour of how it works.", cta:"Show me"},
  {sel:'.dose', title:"This is your day", body:"Each card is a supplement, grouped by <b>when</b> to take it — morning, lunch, dinner, bedtime. The AI already timed them for you.", pos:'below'},
  {sel:'.check', title:"Logging is one tap", body:"Tap the circle to mark a dose <b>taken</b>. That’s the whole thing. <b>Long-press</b> it to skip honestly — skipping never breaks your streak.", pos:'below', pulse:true},
  {sel:'#streakPill', title:"Build your streak", body:"Every day you log grows your streak. It’s about <b>consistency, not perfection</b> — a missed day is just room to grow.", pos:'below'},
  {sel:'#fab', title:"Add a supplement", body:"Tap <b>+</b> to add one. Scan a label (or type it in) and the AI schedules it into your day — separating things that clash, pairing things that help.", pos:'above'},
  {sel:'.tabs', title:"Your other screens", body:"<b>My Stack</b> is everything you take. <b>Progress</b> has your streak, calendar, and achievements. Tap around anytime.", pos:'above'},
  {sel:'.gear', title:"You’re all set", body:"Replay this tour anytime from the <b>⚙︎ Settings</b> gear. Now go log your first dose — your streak is waiting. 🔥", cta:"Start using STACKED", pos:'below'},
];
let tutStep=0;
function ensureTutDOM(){
  if(document.getElementById('tut')) return;
  const d=document.createElement('div'); d.id='tut'; d.className='tut';
  d.innerHTML=`<div class="tut-ring" id="tutRing"></div>
    <button class="tut-skip" onclick="endTutorial()">Skip tour</button>
    <div class="tut-card" id="tutCard">
      <div class="step" id="tutStepLbl"></div>
      <div class="th" id="tutTitle"></div>
      <div class="tb" id="tutBody"></div>
      <div class="tut-foot">
        <div class="tut-dots" id="tutDots"></div>
        <div class="tut-btns">
          <button class="tut-back" id="tutBack" onclick="tutGo(tutStep-1)">Back</button>
          <button class="tut-next" id="tutNext" onclick="tutGo(tutStep+1)">Next</button>
        </div>
      </div>
    </div>`;
  document.getElementById('app').appendChild(d);
}
function startTutorial(){
  showTab('today');            // ensure targets exist
  ensureTutDOM();
  document.getElementById('tut').classList.add('on');
  tutGo(0);
}
function tutGo(i){
  if(i<0) i=0;
  if(i>=TUT.length){ endTutorial(); return; }
  tutStep=i;
  const s=TUT[i];
  const app=document.getElementById('app').getBoundingClientRect();
  const ring=document.getElementById('tutRing');
  const card=document.getElementById('tutCard');
  // dots
  document.getElementById('tutDots').innerHTML=TUT.map((_,j)=>`<i class="${j===i?'on':''}"></i>`).join('');
  document.getElementById('tutStepLbl').textContent=`Step ${i+1} of ${TUT.length}`;
  document.getElementById('tutTitle').textContent=s.title;
  document.getElementById('tutBody').innerHTML=s.body;
  document.getElementById('tutBack').style.visibility = i===0?'hidden':'visible';
  document.getElementById('tutNext').textContent = s.cta || (i===TUT.length-1?'Done':'Next');

  const target = s.sel ? document.querySelector(s.sel) : null;
  if(!target){
    // centered card, no spotlight
    ring.style.opacity='0';
    card.style.top='50%'; card.style.transform='translateY(-50%)';
    return;
  }
  ring.style.opacity='1';
  const r=target.getBoundingClientRect();
  const pad=8;
  const x=r.left-app.left-pad, y=r.top-app.top-pad, w=r.width+pad*2, h=r.height+pad*2;
  ring.style.left=x+'px'; ring.style.top=y+'px'; ring.style.width=w+'px'; ring.style.height=h+'px';
  ring.className='tut-ring'+(s.pulse?' pulse':'');
  // place card above or below the target, clamped
  card.style.transform='none';
  const cardH=170;
  let top;
  if(s.pos==='above'){ top=y-cardH-14; }
  else { top=y+h+14; }
  const appH=app.height;
  if(top<12) top=12;
  if(top+cardH>appH-12) top=Math.max(12, y-cardH-14);
  if(top+cardH>appH-12) top=appH-cardH-12;
  card.style.top=top+'px';
}
function endTutorial(){
  const t=document.getElementById('tut'); if(t) t.classList.remove('on');
  S.tutorialDone=true; save();
}

// ---------- boot ----------
renderToday(); renderStack(); renderProgress();
// first-launch tutorial
if(!S.tutorialDone){ setTimeout(()=>{ try{ startTutorial(); }catch(e){} }, 600); }
